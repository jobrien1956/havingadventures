# .github/workflows/deploy-production.yml
#
# Deploys havingadventures to havingadventures.com (DreamHost) via SFTP
# on every push to the `production` branch.
#
# SETUP STEPS (one-time, in your GitHub repo):
#   1. Go to Settings → Secrets and variables → Actions → New repository secret
#   2. Add these secrets:
#        TURBIFY_FTP_HOST      → iad1-shared-e1-18.dreamhost.com
#        TURBIFY_FTP_USER      → jamobr4
#        TURBIFY_FTP_PASSWORD  → your DreamHost password
#
# HOW TO DEPLOY:
#   Merge master into production and push — deploy runs automatically.

name: 🚀 Deploy to havingadventures.com

on:
  push:
    branches:
      - production

jobs:
  deploy:
    name: Deploy to DreamHost via SFTP
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the production branch ──────────────────────────
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      # ── 2. Verify key files look correct ────────────────────────────
      - name: 🔍 Verify files
        run: |
          echo "=== views/app.js basePath ==="
          grep "basePath" views/app.js | head -3
          echo "=== index.html script/link lines ==="
          grep -E "(src|href)=" index.html | grep -v "maxcdn\|googleapis\|unpkg\|ajax"

      # ── 3. Deploy to DreamHost via SFTP ─────────────────────────────
      - name: 📂 Deploy to DreamHost via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server:       ${{ secrets.TURBIFY_FTP_HOST }}
          username:     ${{ secrets.TURBIFY_FTP_USER }}
          password:     ${{ secrets.TURBIFY_FTP_PASSWORD }}
          protocol:     sftp
          port:         22
          local-dir:    ./
          server-dir:   /home/jamobr4/havingadventures.com/
          exclude: |
            **/.git/**
            **/.github/**
            **/node_modules/**
            .gitignore
            README.md
          log-level:    standard
          dry-run:      false